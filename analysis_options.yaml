include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    # 필요에 따라 severity 조정
    missing_return: error
    dead_code: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # 프로젝트 특성에 맞게 완화하는 규칙
    public_member_api_docs: false  # 앱 프로젝트이므로 공개 API 문서 강제 해제
    lines_longer_than_80_chars: false  # Flutter 위젯 트리는 80자 넘기 쉬움
    sort_constructors_first: false  # freezed 패턴과 충돌
